name: IntervalsICU GPT Coach Audit Runner

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"        # optional: run every Monday at 04:00 UTC
  push:
    branches: [ main ]

jobs:
  run-audit:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Zurich
      ICU_OAUTH: ${{ secrets.INTERVALS_ICU_103 }}
      ICU_CLIENT_ID: ${{ secrets.ICU_CLIENT_ID }}
      ICU_CLIENT_SECRET: ${{ secrets.ICU_CLIENT_SECRET }}
      ICU_REFRESH_TOKEN: ${{ secrets.ICU_REFRESH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests python-dotenv

      - name: Refresh Intervals OAuth token
        id: refresh-token
        run: |
          echo "Refreshing OAuth token..."
          RESPONSE=$(curl -s -X POST "https://intervals.icu/oauth/token" \
            -d "grant_type=refresh_token" \
            -d "client_id=$ICU_CLIENT_ID" \
            -d "client_secret=$ICU_CLIENT_SECRET" \
            -d "refresh_token=$ICU_REFRESH_TOKEN")

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin).get('access_token', ''))")
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Run full audit chain
        run: |
          export ICU_OAUTH=$ACCESS_TOKEN
          python audit_core/tier0_pre_audit.py
          python audit_core/tier1_controller.py
          python audit_core/tier2_event_completeness.py
          python audit_core/tier2_enforce_event_only_totals.py
          python audit_core/tier2_derived_metrics.py
          python audit_core/tier2_actions.py
          python audit_core/tier2_render_validator.py

      - name: Generate integrity baseline
        run: |
          python audit_core/system_integrity_guard.py

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit_core/.integrity.json
